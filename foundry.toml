[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.25"
optimizer = true
optimizer_runs = 200
gas_reports = ["*"]
via_ir = true

# Remappings for nested directory structure
remappings = [
    "DSM.sol=src/DSM.sol",
    "src/ArrayBaseline.sol=src/src/ArrayBaseline.sol",
    "src/src/MappingOnly.sol=src/src/src/MappingOnly.sol"
]

[profile.default.fuzz]
runs = 50

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"